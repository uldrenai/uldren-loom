name: PR gate

# We are not accepting external contributions yet (the contribution + CLA guidance is still being
# finalized). Until then, only maintainers (write/admin on this repo) and internal bots may open
# pull requests; everyone else's PR is closed with an explanatory comment.
# Remove this workflow when external contributions open up - the CLA status check then gates merges.

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const actor = pr.user.login;

            // Internal automation (the release-plz GitHub App, Dependabot, etc.).
            if (pr.user.type === "Bot") {
              core.info(`Allowed bot ${actor}.`);
              return;
            }

            // Identify maintainers by repository permission - reliable even when org membership is
            // private (author_association is reported as NONE/CONTRIBUTOR in that case).
            let permission = "none";
            try {
              const res = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: actor,
              });
              permission = res.data.permission;
            } catch (err) {
              permission = "none";
            }
            if (permission === "admin" || permission === "write") {
              core.info(`Allowed ${actor} (permission: ${permission}).`);
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                "Thanks for your interest in Uldren Loom.",
                "",
                "We are not accepting external pull requests yet - the contribution and CLA process",
                "is still being set up. Please open an issue to discuss your change, or check back soon.",
              ].join("\n"),
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              state: "closed",
            });
            core.notice(`Closed PR #${pr.number} from ${actor} (permission: ${permission}).`);
