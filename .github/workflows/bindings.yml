name: Bindings

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  node:
    name: node (${{ matrix.settings.target }})
    runs-on: ${{ matrix.settings.os }}
    defaults:
      run:
        working-directory: bindings/node
    strategy:
      fail-fast: false
      matrix:
        settings:
          - { os: macos-14, target: aarch64-apple-darwin }
          - { os: macos-15-intel, target: x86_64-apple-darwin }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v6
      - name: Sync binding version
        run: ./scripts/sync-binding-versions.sh
        shell: bash
        working-directory: ${{ github.workspace }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: corepack enable
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm test

  wasm:
    name: wasm-pack
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/wasm
    steps:
      - uses: actions/checkout@v6
      - name: Sync binding version
        run: ./scripts/sync-binding-versions.sh
        shell: bash
        working-directory: ${{ github.workspace }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: jetli/wasm-pack-action@v0.4.0
      - run: wasm-pack build --target web --release

  jvm:
    name: jvm (FFM, JDK 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Sync binding version
        run: ./scripts/sync-binding-versions.sh
        shell: bash
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p uldren-loom-ffi --release
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "22"
      - run: ./gradlew build
        working-directory: bindings/jvm
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release

  swift:
    name: swift (SwiftPM)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Sync binding version
        run: ./scripts/sync-binding-versions.sh
        shell: bash
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p uldren-loom-ffi --release
      - run: swift test
        working-directory: bindings/swift
        env:
          LIBRARY_PATH: ${{ github.workspace }}/target/release
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/target/release

  kotlin:
    name: kotlin (jvm compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Sync binding version
        run: ./scripts/sync-binding-versions.sh
        shell: bash
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "22"
      - uses: android-actions/setup-android@v4
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.10"
      - run: gradle :compileKotlinJvm
        working-directory: bindings/kotlin

  react-native:
    name: react-native (install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Sync binding version
        run: ./scripts/sync-binding-versions.sh
        shell: bash
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm install
        working-directory: bindings/react-native
