name: Bindings

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  node:
    name: node (${{ matrix.settings.target }})
    runs-on: ${{ matrix.settings.os }}
    defaults:
      run:
        working-directory: bindings/node
    strategy:
      fail-fast: false
      matrix:
        settings:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: macos-13, target: x86_64-apple-darwin }
          - { os: macos-14, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v6
      - name: Sync binding version
        run: ./scripts/sync-binding-versions.sh
        shell: bash
        working-directory: ${{ github.workspace }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm install
      - run: npm run build
      - run: npm test

  wasm:
    name: wasm-pack
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/wasm
    steps:
      - uses: actions/checkout@v6
      - name: Sync binding version
        run: ./scripts/sync-binding-versions.sh
        shell: bash
        working-directory: ${{ github.workspace }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: jetli/wasm-pack-action@v0.4.0
      - run: wasm-pack build --target web --release

  jvm:
    name: jvm (FFM, JDK 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Sync binding version
        run: ./scripts/sync-binding-versions.sh
        shell: bash
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p loom-ffi --release
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "22"
      - run: ./gradlew build
        working-directory: bindings/jvm
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release
