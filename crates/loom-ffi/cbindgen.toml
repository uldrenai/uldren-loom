# cbindgen config for generating the public C header `include/loom.h`.
# Run via the justfile: `just header`  (cbindgen crates/loom-ffi -o include/loom.h)
autogen_warning = "/* This file is auto-generated. Regenerate with `just header`. */"
cpp_compat = true
header = """/* Uldren Loom C ABI. Generated by cbindgen - do not edit by hand.
 * Licensed under BUSL-1.1. (c) Uldren Technologies LLC. */"""
include_guard = "ULDREN_LOOM_H"
language = "C"
style = "type"
tab_width = 4

[export]
prefix = ""

[parse]
parse_deps = false
